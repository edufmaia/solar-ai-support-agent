name: solar-ai-support-agent

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-solar-ai-support-agent}
      APP_PORT: ${APP_PORT:-8000}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-solar_ai_support}
      DATABASE_USER: ${DATABASE_USER:-solar}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-solar_password}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://solar:solar_password@postgres:5432/solar_ai_support}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_INPUT_PRICE_PER_1M_TOKENS: ${OPENAI_INPUT_PRICE_PER_1M_TOKENS:-0.15}
      OPENAI_OUTPUT_PRICE_PER_1M_TOKENS: ${OPENAI_OUTPUT_PRICE_PER_1M_TOKENS:-0.60}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      CLAUDE_MAX_TOKENS: ${CLAUDE_MAX_TOKENS:-1024}
      CLAUDE_INPUT_PRICE_PER_1M_TOKENS: ${CLAUDE_INPUT_PRICE_PER_1M_TOKENS:-5.00}
      CLAUDE_OUTPUT_PRICE_PER_1M_TOKENS: ${CLAUDE_OUTPUT_PRICE_PER_1M_TOKENS:-25.00}
      GEOCODING_PROVIDER: ${GEOCODING_PROVIDER:-mock}
      NOMINATIM_BASE_URL: ${NOMINATIM_BASE_URL:-https://nominatim.openstreetmap.org/search}
      NOMINATIM_USER_AGENT: ${NOMINATIM_USER_AGENT:-solar-ai-support-agent}
      GEOCODING_TIMEOUT_SECONDS: ${GEOCODING_TIMEOUT_SECONDS:-5.0}
      SOLAR_PROVIDER: ${SOLAR_PROVIDER:-mock}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_SESSION_TTL_SECONDS: ${ADMIN_SESSION_TTL_SECONDS:-3600}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    ports:
      - "8010:8000"

  migrate:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${DATABASE_PASSWORD:-solar_password}
    volumes:
      - ./database:/schema:ro
    command: >-
      psql -h postgres -U ${DATABASE_USER:-solar}
      -d ${DATABASE_NAME:-solar_ai_support}
      -v ON_ERROR_STOP=1 -f /schema/schema.sql

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-solar_ai_support}
      POSTGRES_USER: ${DATABASE_USER:-solar}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-solar_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-solar} -d ${DATABASE_NAME:-solar_ai_support}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5434:5432"
    volumes:
      - solar_ai_support_agent_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6381:6379"
    volumes:
      - solar_ai_support_agent_redis_data:/data

volumes:
  solar_ai_support_agent_postgres_data:
    name: solar_ai_support_agent_postgres_data
  solar_ai_support_agent_redis_data:
    name: solar_ai_support_agent_redis_data
