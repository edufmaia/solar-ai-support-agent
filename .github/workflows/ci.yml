name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Ruff lint
        working-directory: backend
        run: ruff check .
      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: mypy
        working-directory: backend
        run: mypy

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Run unit tests with coverage
        working-directory: backend
        run: python -m pytest tests/unit -q --cov=app --cov-report=term-missing --cov-fail-under=74

  security:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install pip-audit
        run: pip install pip-audit==2.10.1
      - name: Audit runtime dependencies
        working-directory: backend
        run: pip-audit -r requirements.txt --strict

  integration:
    name: Integration (Postgres + Redis)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: solar_ai_support
          POSTGRES_USER: solar
          POSTGRES_PASSWORD: solar_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U solar -d solar_ai_support"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://solar:solar_password@localhost:5432/solar_ai_support
      REDIS_URL: redis://localhost:6379/0
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements-dev.txt
      - name: Apply database schema
        run: python database/apply_schema.py
      - name: Run integration tests
        working-directory: backend
        run: |
          python tests/repository_smoke_test.py
          python tests/agent_turn_event_test.py
          python tests/metrics_test.py
          python tests/session_test.py
          python tests/chatwoot_test.py
          python tests/conversation_detail_test.py
          python tests/knowledge_smoke_test.py
