<!DOCTYPE html>
<html lang="pt-BR" data-role="customer-chat">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimento</title>
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <div class="chat-page">
    <section id="chat-card" aria-label="Chat de atendimento">
      <header class="chat-header">
        <span id="brand-logo" class="brand-logo" aria-hidden="true">☀️</span>
        <div class="brand-titles">
          <strong id="brand-name">Solar AI</strong>
          <small id="brand-subtitle">Atendimento inteligente</small>
        </div>
        <span class="online-dot" title="online"></span>
        <button id="new-conversation" class="btn-reset" title="Nova conversa" aria-label="Nova conversa">↺</button>
      </header>
      <div id="messages" class="chat-messages" role="log" aria-live="polite"></div>
      <form id="chat-form" class="chat-input">
        <input id="message-input" type="text" autocomplete="off" aria-label="Mensagem" />
        <button id="send-btn" type="submit" aria-label="Enviar">➤</button>
      </form>
      <footer id="chat-footer" class="chat-footer hidden"></footer>
    </section>
  </div>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
