<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo — site da empresa</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; color: #1f2430; }
    .hero { background: #0f172a; color: #fff; padding: 80px 24px; text-align: center; }
    .hero h1 { font-size: 32px; margin: 0 0 12px; }
    .content { max-width: 720px; margin: 0 auto; padding: 40px 24px; line-height: 1.6; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>EnergiaSol — sua conta de luz menor</h1>
    <p>Página fictícia de demonstração do widget de atendimento.</p>
  </section>
  <main class="content">
    <h2>Sobre</h2>
    <p>Esta página simula o site de uma empresa. O chat aparece no canto inferior
       direito através de uma única linha de <code>&lt;script&gt;</code>.</p>
    <p>Clique no botão flutuante para conversar com o assistente.</p>
  </main>
  <script src="widget.js" data-teaser="Quer simular sua economia com energia solar?"></script>
</body>
</html>
